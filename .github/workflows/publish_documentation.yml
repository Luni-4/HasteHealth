name: Publish Documentation
on:
  release:
    types: [published]

jobs:
  rust_book:
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

        # Use nightly so can have access to unstable options for rustdoc.
      - run: rustup update nightly && rustup default nightly
      # Compile with workspace entry with the enable-index-page flag.
      - name: Compile documentation.
        run: cd backend && RUSTDOCFLAGS="--enable-index-page -Zunstable-options" cargo +nightly doc --workspace --no-deps
      - name: Copy wrangler config
        # Tmp delete large file that wrangler chokes on.
        run: cp backend/wrangler/rust-book.wrangler.jsonc ./backend/wrangler.jsonc && rm backend/target/doc/src/haste_fhir_model/r4/generated/terminology.rs.html
      - name: Build & Deploy Worker
        uses: cloudflare/wrangler-action@v4
        with:
          wranglerVersion: "4.107.0"
          workingDirectory: "backend"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  typedoc:
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 11.9.0

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 23.9.0

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install && pnpm -r build

      # Compile with typescript documentation.
      - name: Compile documentation.
        working-directory: ./frontend
        run: pnpm generate-documentation

      - name: Copy wrangler config
        run: |
          cp frontend/wrangler/typedoc.wrangler.jsonc ./wrangler.jsonc
          echo "allowBuilds:\n  sharp: true\n  workerd: true\n  esbuild: true\n  core-js-pure: true\n  core-js: true"
          echo "ignore-workspace-root-check=true" >> .npmrc

      - name: Build & Deploy Worker
        uses: cloudflare/wrangler-action@v4
        with:
          wranglerVersion: "4.107.0"
          workingDirectory: "frontend"
          packageManager: pnpm
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
